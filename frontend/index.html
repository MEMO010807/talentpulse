<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentPulse — AI-Powered Talent Scouting</title>
<meta name="description" content="AI-Powered Talent Scouting & Engagement Agent. Go from a raw JD to a ranked candidate shortlist in under 20 seconds.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a27;--bg4:#22222f;
  --blue:#2563eb;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#f0f0f5;--text2:#a0a0b5;--text3:#60607a;
  --radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
h1,h2,h3,h4,.score-num{font-family:'Space Grotesk',sans-serif}
a{color:var(--cyan);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 24px}
header{padding:32px 0 16px;text-align:center;border-bottom:1px solid var(--bg3)}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text2);font-size:.95rem;margin-top:4px}
.input-section{margin-top:40px}
.input-section label{font-weight:600;font-size:1.05rem;display:block;margin-bottom:10px}
textarea{width:100%;min-height:200px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;resize:vertical;transition:border .2s}
textarea:focus{outline:none;border-color:var(--blue)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:16px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 20px rgba(37,99,235,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-demo{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:transparent;color:var(--cyan);border:1px solid var(--cyan);border-radius:var(--radius-sm);font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-demo:hover{background:rgba(6,182,212,.1);transform:translateY(-1px)}
.btn-demo:disabled{opacity:.5;cursor:not-allowed;transform:none}
.powered{color:var(--text3);font-size:.8rem;margin-top:10px}
.loader-section{display:none;text-align:center;padding:60px 0}
.loader-section.active{display:block}
.spinner{width:48px;height:48px;border:3px solid var(--bg3);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-step{color:var(--cyan);font-size:1.05rem;font-weight:500;min-height:28px}
.error-box{display:none;background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:var(--radius-sm);padding:20px;text-align:center;margin-top:24px;color:var(--red)}
.error-box.active{display:block}
.btn-retry{margin-top:12px;padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:600;cursor:pointer}
.demo-banner{background:#1e3a5f;color:#93c5fd;padding:10px 16px;border-radius:var(--radius-sm);font-size:.82rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;border:1px solid #2563eb44}
.warn-banner{background:#1c1a0f;color:#fbbf24;padding:10px 16px;border-radius:var(--radius-sm);font-size:.82rem;margin-top:12px;border:1px solid #fbbf2444}
.meta-bar{display:flex;flex-wrap:wrap;gap:18px;padding:10px 0;font-size:.75rem;color:var(--text3);border-bottom:1px solid var(--bg3);margin-bottom:16px}
.meta-bar span b{color:var(--text2)}
.meta-bar .meta-fail{color:#f87171}
.parsed-jd{display:none;margin-top:40px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);overflow:hidden}
.parsed-jd.active{display:block;animation:fadeUp .5s ease}
.parsed-jd-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;user-select:none}
.parsed-jd-header h3{font-size:1rem;color:var(--cyan)}
.parsed-jd-header .chevron{transition:transform .3s;color:var(--text3)}
.parsed-jd-header.open .chevron{transform:rotate(180deg)}
.parsed-jd-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.parsed-jd-body.open{max-height:600px}
.parsed-jd-content{padding:0 20px 20px}
.jd-field{margin-bottom:12px}
.jd-field-label{font-size:.75rem;text-transform:uppercase;color:var(--text3);letter-spacing:.05em;margin-bottom:4px}
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:500;margin:2px 4px 2px 0}
.tag-blue{background:rgba(37,99,235,.15);color:var(--blue)}
.tag-cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.results-section{display:none;margin-top:32px}
.results-section.active{display:block}
.results-header{margin-bottom:24px}
.results-header h2{font-size:1.4rem}
.results-header p{color:var(--text2);font-size:.9rem;margin-top:4px}
.candidate-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:24px;margin-bottom:20px;opacity:0;animation:fadeUp .5s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.candidate-card:nth-child(1){animation-delay:.1s}
.candidate-card:nth-child(2){animation-delay:.2s}
.candidate-card:nth-child(3){animation-delay:.3s}
.candidate-card:nth-child(4){animation-delay:.4s}
.candidate-card:nth-child(5){animation-delay:.5s}
.card-top{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.rank-badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#facc15,#f59e0b);color:#000}
.rank-2{background:linear-gradient(135deg,#cbd5e1,#94a3b8);color:#000}
.rank-3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.rank-4,.rank-5{background:var(--bg4);color:var(--text2)}
.card-info{flex:1;min-width:200px}
.card-info h3{font-size:1.1rem;margin-bottom:2px}
.card-info .subtitle{color:var(--text2);font-size:.88rem}
.avail-badge{display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
.avail-not-looking{background:#7f1d1d;color:#fca5a5}
.avail-default{color:var(--text3);font-size:.75rem}
.final-score-box{text-align:center;min-width:80px}
.final-score-box .score-num{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.final-score-box .score-label{font-size:.7rem;text-transform:uppercase;color:var(--text3);letter-spacing:.05em}
.score-bars{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.score-bar-group label{font-size:.78rem;color:var(--text2);display:flex;justify-content:space-between;margin-bottom:4px}
.score-track{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.score-fill.blue{background:linear-gradient(90deg,var(--blue),#3b82f6)}
.score-fill.cyan{background:linear-gradient(90deg,var(--cyan),#22d3ee)}
.interest-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;margin-left:6px}
.badge-hot{background:rgba(239,68,68,.15);color:#f87171}
.badge-warm{background:rgba(245,158,11,.15);color:var(--amber)}
.badge-cold{background:rgba(96,165,250,.15);color:#60a5fa}
.score-breakdown{font-size:.7rem;color:#64748b;margin-top:6px}
.skills-row{margin-top:14px;display:flex;flex-wrap:wrap;gap:4px}
.tag-green{background:rgba(16,185,129,.15);color:var(--green)}
.tag-red{background:rgba(239,68,68,.1);color:#f87171}
.explanation{margin-top:12px;font-style:italic;color:var(--text2);font-size:.88rem;line-height:1.5}
.conv-toggle{margin-top:14px;padding:8px 16px;background:transparent;border:1px solid var(--bg4);border-radius:var(--radius-sm);color:var(--cyan);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.conv-toggle:hover{background:var(--bg3)}
.conv-body{max-height:0;overflow:hidden;transition:max-height .5s ease}
.conv-body.open{max-height:800px}
.chat{padding:16px 0}
.chat-msg{display:flex;margin-bottom:10px}
.chat-msg.recruiter{justify-content:flex-start}
.chat-msg.candidate{justify-content:flex-end}
.chat-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:.88rem;line-height:1.5}
.recruiter .chat-bubble{background:var(--bg3);border-bottom-left-radius:2px;color:var(--text)}
.candidate .chat-bubble{background:rgba(37,99,235,.2);border-bottom-right-radius:2px;color:var(--text)}
.chat-role{font-size:.7rem;text-transform:uppercase;color:var(--text3);margin-bottom:2px;letter-spacing:.04em}
.interest-reason{margin-top:8px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius-sm);font-size:.84rem;color:var(--text2);border-left:3px solid var(--cyan)}
footer{text-align:center;padding:40px 0 32px;color:var(--text3);font-size:.82rem;border-top:1px solid var(--bg3);margin-top:60px}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:1rem}
@media(max-width:640px){
  .score-bars{grid-template-columns:1fr}
  .card-top{flex-direction:column;align-items:stretch}
  .final-score-box{text-align:left}
  .chat-bubble{max-width:85%}
  .meta-bar{gap:10px}
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>&#9889; TalentPulse</h1>
    <p>AI-Powered Talent Scouting &amp; Engagement</p>
  </div>
</header>

<main class="container">
  <section class="input-section" id="inputSection">
    <label for="jdInput">Paste your Job Description</label>
    <textarea id="jdInput" placeholder="Paste your Job Description here..."></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="scoutBtn" onclick="handleScout()">Scout Candidates &rarr;</button>
      <button class="btn-demo" id="demoBtn" onclick="handleDemo()">&#9889; Try Demo</button>
    </div>
    <p class="powered">Powered by Gemini Flash Lite</p>
  </section>

  <section class="loader-section" id="loader">
    <div class="spinner"></div>
    <p class="loader-step" id="loaderStep">Parsing job description...</p>
  </section>

  <div class="error-box" id="errorBox">
    <p id="errorMsg">Something went wrong.</p>
    <button class="btn-retry" onclick="handleScout()">Retry</button>
  </div>

  <section class="parsed-jd" id="parsedJd">
    <div class="parsed-jd-header" id="parsedJdToggle" onclick="toggleParsedJd()">
      <h3>&#128203; Parsed Job Description</h3>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="parsed-jd-body" id="parsedJdBody">
      <div class="parsed-jd-content" id="parsedJdContent"></div>
    </div>
  </section>

  <section class="results-section" id="resultsSection">
    <div id="demoBanner"></div>
    <div id="metaBar"></div>
    <div class="results-header">
      <h2>&#127942; Ranked Shortlist</h2>
      <p id="pipelineSummary"></p>
    </div>
    <div id="candidatesList"></div>
    <div id="warnBanner"></div>
  </section>
</main>

<footer>
  <div class="container">Built for Catalyst Hackathon &mdash; Deccan AI Experts</div>
</footer>

<script>
const API = 'http://localhost:8000';
const STEPS = ['Parsing job description...','Scoring all 20 candidates (batch)...','Simulating outreach conversations (batch)...','Ranking shortlist...'];
let stepInterval;

function showLoader(){
  document.getElementById('loader').classList.add('active');
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('parsedJd').classList.remove('active');
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('scoutBtn').disabled = true;
  document.getElementById('demoBtn').disabled = true;
  let i = 0;
  const el = document.getElementById('loaderStep');
  el.textContent = STEPS[0];
  stepInterval = setInterval(()=>{i=(i+1)%STEPS.length;el.textContent=STEPS[i]},2500);
}

function hideLoader(){
  document.getElementById('loader').classList.remove('active');
  document.getElementById('scoutBtn').disabled = false;
  document.getElementById('demoBtn').disabled = false;
  clearInterval(stepInterval);
}

function showError(msg){
  hideLoader();
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.add('active');
}

async function handleScout(){
  const jd = document.getElementById('jdInput').value.trim();
  if(!jd){alert('Please paste a Job Description first.');return;}
  if(jd.length < 50){alert('Job description is too short (minimum 50 characters).');return;}
  showLoader();
  try{
    const res = await fetch(`${API}/api/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_description:jd})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||`Server error ${res.status}`);}
    const data = await res.json();
    hideLoader();
    renderResults(data, false);
  }catch(err){
    showError(err.message||'Failed to connect to the API. Is the server running?');
  }
}

async function handleDemo(){
  showLoader();
  try{
    const res = await fetch(`${API}/api/demo`);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||`Server error ${res.status}`);}
    const data = await res.json();
    hideLoader();
    renderResults(data, true);
  }catch(err){
    showError(err.message||'Failed to load demo. Is the server running?');
  }
}

function renderPipelineMeta(meta){
  if(!meta) return '';
  let html = '<div class="meta-bar">';
  html += `<span>&#127919; <b>${meta.candidates_scored_successfully}</b>/${meta.candidates_screened} scored</span>`;
  html += `<span>&#9889; <b>${meta.total_gemini_calls}</b> API calls</span>`;
  html += `<span>&#9201; <b>${meta.wall_time_seconds}s</b></span>`;
  html += `<span>&#9878; Match <b style="color:#2563eb">${Math.round((meta.weights?.match||0.6)*100)}%</b> &middot; Interest <b style="color:#06b6d4">${Math.round((meta.weights?.interest||0.4)*100)}%</b></span>`;
  if(meta.failed_scoring_count > 0){
    html += `<span class="meta-fail">&#9888; ${meta.failed_scoring_count} scoring failure(s)</span>`;
  }
  html += '</div>';
  return html;
}

function renderResults(data, isDemo){
  // FIX-F1: Demo banner
  const bannerEl = document.getElementById('demoBanner');
  if(isDemo){
    bannerEl.innerHTML = '<div class="demo-banner">&#9889; Pre-computed demo &mdash; no Gemini API calls were made. Paste a real JD above to run live inference.</div>';
  } else {
    bannerEl.innerHTML = '';
  }

  // Pipeline meta (FIX-F3)
  document.getElementById('metaBar').innerHTML = renderPipelineMeta(data.pipeline_meta);

  // Parsed JD
  const pjd = data.parsed_jd;
  let html = '';
  html += `<div class="jd-field"><div class="jd-field-label">Role</div><strong>${esc(pjd.role_title||'')}</strong></div>`;
  html += `<div class="jd-field"><div class="jd-field-label">Domain</div>${esc(pjd.domain||'')}</div>`;
  html += `<div class="jd-field"><div class="jd-field-label">Experience</div>${pjd.min_experience_years||0}+ years</div>`;
  html += `<div class="jd-field"><div class="jd-field-label">Education</div>${esc(pjd.education_requirement||'Not specified')}</div>`;
  html += `<div class="jd-field"><div class="jd-field-label">Required Skills</div>${(pjd.required_skills||[]).map(s=>`<span class="tag tag-blue">${esc(s)}</span>`).join('')}</div>`;
  html += `<div class="jd-field"><div class="jd-field-label">Preferred Skills</div>${(pjd.preferred_skills||[]).map(s=>`<span class="tag tag-cyan">${esc(s)}</span>`).join('')}</div>`;
  document.getElementById('parsedJdContent').innerHTML = html;
  document.getElementById('parsedJd').classList.add('active');
  document.getElementById('parsedJdToggle').classList.add('open');
  document.getElementById('parsedJdBody').classList.add('open');

  // Pipeline summary
  document.getElementById('pipelineSummary').textContent = data.pipeline_summary||'';

  // Candidates
  const list = document.getElementById('candidatesList');
  list.innerHTML = '';

  // Empty state guard
  if(!data.shortlist || data.shortlist.length === 0){
    list.innerHTML = '<div class="empty-state">No candidates could be scored. Try again or use Demo mode.</div>';
    document.getElementById('resultsSection').classList.add('active');
    return;
  }

  data.shortlist.forEach((item,idx)=>{
    const c = item.candidate;
    const rankClass = `rank-${item.rank}`;
    const interestEmoji = item.interest_label==='Hot'?'&#128293;':item.interest_label==='Warm'?'&#127780;':'&#10052;';
    const badgeClass = item.interest_label==='Hot'?'badge-hot':item.interest_label==='Warm'?'badge-warm':'badge-cold';
    const cardId = `card-${idx}`;

    // FIX-F5: Availability badge
    const availBadge = c.availability === 'not looking'
      ? '<span class="avail-badge avail-not-looking">not looking</span>'
      : `<span class="avail-badge avail-default">${esc(c.availability||'')}</span>`;

    let card = `<div class="candidate-card" id="${cardId}">`;
    card += '<div class="card-top">';
    card += `<div class="rank-badge ${rankClass}">#${item.rank}</div>`;
    card += `<div class="card-info"><h3>${esc(c.name)}</h3><div class="subtitle">${esc(c.current_role)} at ${esc(c.current_company)} &middot; ${c.years_experience} yrs &middot; ${esc(c.location||'')} ${availBadge}</div></div>`;
    card += `<div class="final-score-box"><div class="score-num">${item.final_score}</div><div class="score-label">Final Score</div></div>`;
    card += '</div>';

    // Score bars
    card += '<div class="score-bars">';
    card += `<div class="score-bar-group"><label><span>Match Score</span><span>${item.match_score}</span></label><div class="score-track"><div class="score-fill blue" data-w="${item.match_score}"></div></div></div>`;
    card += `<div class="score-bar-group"><label><span>Interest Score <span class="interest-badge ${badgeClass}">${interestEmoji} ${esc(item.interest_label||'')}</span></span><span>${item.interest_score}</span></label><div class="score-track"><div class="score-fill cyan" data-w="${item.interest_score}"></div></div></div>`;
    card += '</div>';

    // FIX-F4: Score breakdown
    const sb = item.score_breakdown;
    if(sb){
      let bdHtml = `<div class="score-breakdown">Skills coverage: <b>${sb.skills_coverage_pct ?? '—'}%</b> &middot; Exp gap: <b>${sb.experience_gap_years === 0 ? 'none' : sb.experience_gap_years + 'yr short'}</b> &middot; Domain: <b>${sb.domain_match ? '&#10003; match' : '&#10007; mismatch'}</b>`;
      if(item.llm_match_score != null){
        bdHtml += ` &middot; LLM: <b>${item.llm_match_score}</b> Det: <b>${item.det_match_score}</b>`;
      }
      bdHtml += '</div>';
      card += bdHtml;
    }

    // Skills
    card += '<div class="skills-row">';
    (item.matched_skills||[]).forEach(s=>{card+=`<span class="tag tag-green">${esc(s)}</span>`});
    (item.missing_skills||[]).forEach(s=>{card+=`<span class="tag tag-red">${esc(s)}</span>`});
    card += '</div>';

    // Explanation
    if(item.match_explanation) card += `<p class="explanation">${esc(item.match_explanation)}</p>`;

    // Conversation toggle
    const convId = `conv-${idx}`;
    card += `<button class="conv-toggle" onclick="toggleConv('${convId}')">View Conversation &rarr;</button>`;
    card += `<div class="conv-body" id="${convId}">`;
    card += '<div class="chat">';
    (item.conversation||[]).forEach(m=>{
      card += `<div class="chat-msg ${m.role}"><div><div class="chat-role">${m.role}</div><div class="chat-bubble">${esc(m.message)}</div></div></div>`;
    });
    card += '</div>';
    if(item.interest_reasoning) card += `<div class="interest-reason"><strong>Interest Analysis:</strong> ${esc(item.interest_reasoning)}</div>`;
    card += '</div>';

    card += '</div>';
    list.innerHTML += card;
  });

  // FIX-F2: Failed candidates warning
  const warnEl = document.getElementById('warnBanner');
  if(data.failed_scoring_count > 0){
    warnEl.innerHTML = `<div class="warn-banner">&#9888;&#65039; ${data.failed_scoring_count} candidate(s) could not be scored due to a transient API error. Shortlist reflects the remaining candidates.</div>`;
  } else {
    warnEl.innerHTML = '';
  }

  document.getElementById('resultsSection').classList.add('active');

  // Animate score bars
  setTimeout(()=>{
    document.querySelectorAll('.score-fill').forEach(el=>{el.style.width=el.dataset.w+'%'});
  },100);
}

function toggleParsedJd(){
  document.getElementById('parsedJdToggle').classList.toggle('open');
  document.getElementById('parsedJdBody').classList.toggle('open');
}
function toggleConv(id){
  document.getElementById(id).classList.toggle('open');
}
function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
</script>
</body>
</html>
